                  </p>
                  
                  <div className="flex flex-col sm:flex-row items-center gap-3">
                    <div className="flex w-full sm:w-auto gap-3">
                      <button
                        onClick={() => handleOptionClick(idx, 'O')}
                        disabled={isAnswered && isCorrect}
                        className={`flex-1 sm:flex-none w-full sm:w-24 py-3 rounded-xl font-extrabold text-lg transition-all ${
                          currentVal === 'O' 
                        ? (q.answer === 'O' ? 'bg-green-500 text-white shadow-md' : 'bg-red-500 text-white shadow-md')
                        : 'bg-slate-100 text-slate-500 hover:bg-slate-200'
                        }`}
                      >
                        O
                      </button>
                      <button
                        onClick={() => handleOptionClick(idx, 'X')}
                        disabled={isAnswered && isCorrect}
                        className={`flex-1 sm:flex-none w-full sm:w-24 py-3 rounded-xl font-extrabold text-lg transition-all ${
                          currentVal === 'X' 
                        ? (q.answer === 'X' ? 'bg-green-500 text-white shadow-md' : 'bg-red-500 text-white shadow-md')
                        : 'bg-slate-100 text-slate-500 hover:bg-slate-200'
                        }`}
                      >
                        X
                      </button>
                    </div>

                    <div className="flex-1 w-full px-2">
                      {isAnswered && (
                        <div className={`text-xs md:text-sm font-medium p-3 rounded-xl ${isCorrect ? 'bg-green-100 text-green-800' : 'bg-red-50 text-red-700'}`}>
                          {isCorrect ? (
                            <span><strong className="text-green-600">✅ 맞았습니다!</strong> {q.hint}</span>
                          ) : (
                            <span><strong className="text-red-500">❌ 틀렸습니다.</strong> 다시 한 번 지문을 생각해 보세요! (💡 힌트: {q.hint})</span>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function QuizSection({ quizList, moduleTitle }) {
      const [userInfo, setUserInfo] = useState({ grade: '', classNum: '', studentNum: '', name: '' });
      const [isQuizStarted, setIsQuizStarted] = useState(false);
      
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [showResult, setShowResult] = useState(false);
      const [isFinished, setIsFinished] = useState(false);
      const [userResponses, setUserResponses] = useState([]); // 문항별 상세 응답 내역 저장 배열

      // Submission states
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitSuccess, setSubmitSuccess] = useState(false);

      if (!quizList || quizList.length === 0) {
        return <p className="text-center py-12 text-slate-400 text-sm">평가 문제가 준비 중입니다.</p>;
      }

      const currentQuiz = quizList[currentIndex];

      const handleStart = () => {
        if (!userInfo.grade || !userInfo.classNum || !userInfo.studentNum || !userInfo.name.trim()) {
          alert("학년, 반, 번호, 이름을 모두 입력해주세요.");
          return;
        }
        setIsQuizStarted(true);
      };

      const handleOptionClick = (opt) => {
        if (showResult) return;
        setSelectedOption(opt);
        setShowResult(true);
        if (opt === currentQuiz.answer) {
          setScore(s => s + 1);
        }
      };

      const submitData = (finalScoreValue, finalResponses) => {
        setIsSubmitting(true);
        
        // 요구사항 적용: 각 문항별로 열을 달리하여 수집합니다.
        // 예를 들어 I열은 1번 문항 응답 번호, J열은 1번 문항 정오 여부 O, X
        // K열은 2번 문항 응답 번호, L열은 2번 문항 정오 여부 O, X로 가로 리스트 구조를 만듭니다.
        const interleavedResponses = [];
        finalResponses.forEach(r => {
          interleavedResponses.push(r.selectedAnswer); // 문항 응답 내용 추가 (홀수 열에 들어갈 데이터)
          interleavedResponses.push(r.isCorrect ? "O" : "X"); // 정오 여부 추가 (짝수 열에 들어갈 데이터)
        });

        const payload = {
          userInfo: userInfo,
          moduleTitle: moduleTitle,
          score: Math.round((finalScoreValue / quizList.length) * 100),
          correctCount: finalScoreValue,
          totalCount: quizList.length,
          userResponses: interleavedResponses // 번갈아 배치된 가로 1차원 데이터셋 전송
        };

        if (typeof google !== 'undefined' && google.script) {
          // Google Apps Script 환경에서 작동
          google.script.run
            .withSuccessHandler(() => {
              setIsSubmitting(false);
              setSubmitSuccess(true);
            })
            .withFailureHandler((err) => {
              setIsSubmitting(false);
              alert("데이터 전송 중 오류가 발생했습니다: " + err.message);
            })
            .saveQuizResult(payload);
        } else {
          // 로컬 테스트 환경 (콘솔 로그 기록 및 시각화 모니터링)
          console.log("구글 웹앱 전송 페이로드 확인(열 분리 형태): ", payload);
          setTimeout(() => {
            setIsSubmitting(false);
            setSubmitSuccess(true);
          }, 1500);
        }
      };

      const handleNext = () => {
        const isCorrect = selectedOption === currentQuiz.answer;
        
        // 선택한 텍스트 답변 대신 직관적인 보기 번호(1~5)로 치환하여 저장
        const optionNumber = currentQuiz.options.indexOf(selectedOption) + 1;

        const newResponse = {
          questionNumber: currentIndex + 1,
          selectedAnswer: optionNumber > 0 ? optionNumber : selectedOption, 
          isCorrect: isCorrect
        };
        const updatedResponses = [...userResponses, newResponse];
        setUserResponses(updatedResponses);

        // 정답 시 score를 선반영하여 전송하기 위해 정확히 계산
        const nextScore = isCorrect ? score + 1 : score;

        if (currentIndex < quizList.length - 1) {
          // 문제를 마저 풀어야 하므로 다음 단계 세팅
          setCurrentIndex(currentIndex + 1);
          setSelectedOption(null);
          setShowResult(false);
        } else {
          setIsFinished(true);
          // 마지막 문제 응답 누적 후 최종적으로 정확해진 score와 가로 배열을 전송
          submitData(nextScore, updatedResponses);
        }
      };

      const handleRestart = () => {
        setIsFinished(false);
        setIsQuizStarted(false);
        setCurrentIndex(0);
        setScore(0);
        setShowResult(false);
        setSelectedOption(null);
        setUserResponses([]); // 응답 내역 초기화
        setSubmitSuccess(false);
        setUserInfo({ grade: '', classNum: '', studentNum: '', name: '' });
      };

      if (!isQuizStarted) {
        return (
          <div className="max-w-md mx-auto space-y-6 mt-4 bg-white p-8 rounded-3xl border border-slate-200 shadow-sm transition-all hover:shadow-md">
            <div className="text-center space-y-2 mb-6">
              <h3 className="text-2xl font-extrabold text-slate-800">📝 형성 평가 시작하기</h3>
              <p className="text-sm text-slate-500">평가를 시작하기 전 인적 사항을 정확히 입력해 주세요.</p>
            </div>
            <div className="space-y-4">
              <div className="grid grid-cols-3 gap-3">
                <div>
                  <label className="block text-xs font-bold text-slate-700 mb-1">학년</label>
                  <input type="number" className="w-full border border-slate-300 rounded-xl p-2.5 text-sm text-center focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all" value={userInfo.grade} onChange={e => setUserInfo({...userInfo, grade: e.target.value})} placeholder="예: 1" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-700 mb-1">반</label>
                  <input type="number" className="w-full border border-slate-300 rounded-xl p-2.5 text-sm text-center focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all" value={userInfo.classNum} onChange={e => setUserInfo({...userInfo, classNum: e.target.value})} placeholder="예: 3" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-700 mb-1">번호</label>
                  <input type="number" className="w-full border border-slate-300 rounded-xl p-2.5 text-sm text-center focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all" value={userInfo.studentNum} onChange={e => setUserInfo({...userInfo, studentNum: e.target.value})} placeholder="예: 15" />
                </div>
              </div>
              <div>
                <label className="block text-xs font-bold text-slate-700 mb-1">이름</label>
                <input type="text" className="w-full border border-slate-300 rounded-xl p-2.5 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all" value={userInfo.name} onChange={e => setUserInfo({...userInfo, name: e.target.value})} placeholder="이름을 입력하세요" />
              </div>
            </div>
            <button onClick={handleStart} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3.5 rounded-xl transition-all shadow-md mt-4 text-sm tracking-wide">
              평가 시작하기
            </button>
          </div>
        );
      }

      if (isFinished) {
        // 이중 계산 버그를 걷어내고, 상태 전이를 완벽히 반영한 순수 score를 출력
        const displayScore = score;
        const finalScore = Math.round((displayScore / quizList.length) * 100);
        
        return (
          <div className="text-center py-12 space-y-4 max-w-md mx-auto bg-slate-50 border border-slate-200 p-8 rounded-3xl mt-4">
            <div className="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-2 text-indigo-600">
              <CheckCircleIcon />
            </div>
            <h3 className="text-xl font-extrabold text-slate-800">문제를 모두 풀었습니다!</h3>
            <p className="text-slate-600 text-sm font-medium">나의 점수: <span className="font-black text-2xl text-indigo-600">{finalScore}점</span></p>
            <p className="text-xs text-slate-400">({quizList.length}문제 중에서 {displayScore}문제 맞춤)</p>
            
            <div className="mt-6 p-4 rounded-xl text-sm font-bold bg-white border border-slate-200 shadow-sm min-h-[60px] flex items-center justify-center">
               {isSubmitting ? (
                 <span className="text-indigo-600 flex items-center justify-center gap-2">
                   <svg className="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                   구글 시트로 결과를 전송하는 중입니다...
                 </span>
               ) : submitSuccess ? (
                 <span className="text-green-600 flex items-center justify-center gap-2 text-base font-bold">✅ 전송 완료! 수고하셨습니다.</span>
               ) : (
                 <span className="text-red-500 font-bold">⚠️ 전송에 오류가 생겼습니다.</span>
               )}
            </div>

            <button
               onClick={handleRestart}
               className="mt-6 px-6 py-3.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold text-sm shadow-md transition-all w-full"
            >
              처음부터 다시 풀어보기
            </button>
          </div>
        );
      }

      // 화면 구성 정오 마커 제거 (O, X 표시 미노출 구현)
      const isGraded = showResult;

      return (
        <div className="max-w-2xl mx-auto space-y-6">
          <div className="flex items-center justify-between border-b border-slate-100 pb-3">
            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">
              실전 지문 평가 문제 ({currentIndex + 1} / {quizList.length})
            </h3>
            <span className="text-xs text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full font-black">
              맞춘 개수: {score}개
            </span>
          </div>

          <div className="space-y-4">
            <h4 className="text-base sm:text-lg font-extrabold text-slate-900 leading-snug break-keep flex items-center gap-2">
              <span className="shrink-0">Q{currentIndex + 1}.</span> 
              <span className="flex-1">{currentQuiz.question}</span>
            </h4>
          </div>

          {currentQuiz.boxText && (
            <div className="border-2 border-slate-300 rounded-2xl p-5 my-4 bg-slate-50 font-normal text-sm sm:text-sm text-slate-800 leading-relaxed shadow-sm whitespace-pre-wrap break-keep">
              {currentQuiz.boxText}
            </div>
          )}

          <div className="space-y-2.5">
            {currentQuiz.options.map((opt, idx) => {
              const isSelected = selectedOption === opt;
              const isCorrectOption = opt === currentQuiz.answer;
              
              let btnStyle = "bg-white border border-slate-200 hover:bg-slate-50 text-slate-700";
              let numberBgClass = "bg-slate-100 text-slate-500 border-slate-300";
              
              if (isGraded) {
                if (isCorrectOption) {
                  btnStyle = "bg-emerald-50/70 border-2 border-emerald-500 text-emerald-950 font-bold shadow-sm";
                  numberBgClass = "bg-emerald-500 text-white border-transparent";
                } else if (isSelected) {
                  btnStyle = "bg-red-50/70 border-2 border-red-400 text-red-950 font-medium";
                  numberBgClass = "bg-red-500 text-white border-transparent";
                } else {
                  btnStyle = "bg-white border border-slate-100 text-slate-400 opacity-60 pointer-events-none";
                }
              } else if (isSelected) {
                btnStyle = 'border-2 border-indigo-500 bg-indigo-50 text-indigo-900 font-bold';
                numberBgClass = "bg-indigo-500 text-white border-transparent";
              }

              return (
                <button
                  key={idx}
                  onClick={() => handleOptionClick(opt)}
                  disabled={isGraded}
                  className={`w-full text-left py-3.5 px-5 border rounded-2xl text-xs sm:text-sm font-medium transition-all flex items-center gap-3 ${btnStyle}`}
                >
                  <span className={`w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-bold border shrink-0 ${numberBgClass}`}>
                    {idx + 1}
                  </span>
                  <span className="break-keep pr-2">{opt}</span>
                </button>
              );
            })}
          </div>

          {showResult && (
            <div className="bg-slate-50 border-l-4 border-indigo-500/80 p-5 rounded-r-2xl space-y-2 shadow-inner">
              <h5 className="font-extrabold text-indigo-900 text-xs sm:text-sm flex items-center gap-2">
                <span>💡 오답 체크 & 한 눈 요약 해설</span>
              </h5>
              <p className="text-xs text-slate-600 leading-relaxed break-keep">
                {currentQuiz.explanation}
              </p>
            </div>
          )}

          {showResult && (
            <div className="text-right mt-4">
              <button
                onClick={handleNext}
                className="px-5 py-2.5 rounded-xl text-white font-extrabold text-xs sm:text-sm transition-all bg-indigo-600 hover:bg-indigo-700 shadow-md"
              >
                {currentIndex < quizList.length - 1 ? '다음 문제 풀기' : '결과 제출하기'}
              </button>
            </div>
          )}
        </div>
      );
    }

                      activeTab === 'evaluation' 
                        ? 'bg-indigo-600 text-white border-indigo-600 shadow-md scale-[1.01]'
                        : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                    }`}
                  >
                    📝 형성 평가
                  </button>
                )}
              </div>

              {/* ACTIVE CONTENT AREA */}
              <div className="bg-white rounded-3xl border border-slate-200/85 shadow-md p-6 md:p-8 min-h-[420px]">
                {activeTab === 'summary' && <SummarySection activeData={activeData} />}
                {activeTab === 'vocab' && <ContentSummarySection key={`${activeModule}-vocab`} structures={activeData.structures} vocabList={activeData.vocab} activeModule={activeModule} />}
                {activeTab === 'check' && <ContentSection key={`${activeModule}-content`} contentData={activeData.content} />}
                {activeTab === 'evaluation' && hasQuiz && <QuizSection key={`${activeModule}-quiz`} quizList={activeData.quiz} moduleTitle={activeData.title} />}
              </div>

            </div>

            {/* UTILITY BOTTOM BAR (사이드바 대신 하단 전면 배치하여 치우침 방지) */}
            <div className="bg-gradient-to-br from-slate-800 to-slate-900 text-slate-300 p-6 rounded-3xl shadow-sm border border-slate-700/50">
              <h3 className="font-bold text-white text-xs mb-2 flex items-center gap-1.5">
                <InfoIcon /> 도우미 안내
              </h3>
              <p className="text-[11px] text-slate-400 leading-relaxed">
                교과서에 공식 수록된 학술 핵심 용어를 바탕으로 학습 정리용 탭과 문항들이 정렬되었습니다. 상부 탭을 차례로 누르며 소단원을 체계적으로 연마해 보세요!
              </p>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
